services:
  - type: web
    name: algsochvicky
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_GROQ_PROXY_URL
        value: https://algsochvicky-groq.onrender.com/api/groq
    headers:
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin
      - path: /*
        name: Cross-Origin-Embedder-Policy
        value: credentialless
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: algsochvicky-groq
    runtime: node
    buildCommand: npm install
    startCommand: node server/groq-proxy.mjs
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
